<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Relay</title>
  </head>
  <body>
    <script>
      (function () {
        var mainOrigin = window.location.origin;
        try {
          if (document.referrer) mainOrigin = new URL(document.referrer).origin;
        } catch (error) {}
        var target = mainOrigin + '/admin/ai-relay';
        if (window.top !== window) window.top.location.replace(target);
        else window.location.replace(target);
      })();
    </script>
    <noscript><a href="/admin/ai-relay">Open AI Relay</a></noscript>
  </body>
</html>
