<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Generation Plugin</title>
  <script type="module" crossorigin src="/plugins/image-generation/assets/app.js"></script>
  <link rel="stylesheet" crossorigin href="/plugins/image-generation/assets/app.css">
  <script>
    (function () {
      var emptyLabel = "\u6682\u65e0\u53ef\u7528 key";
      var manualHistoryCollapsed = false;
      var autoHistoryCollapsed = false;
      var historyLayoutObserver = null;

      function ensureEmptyKeyOption() {
        var select = document.querySelector('[data-testid="image-key-select"]');
        if (!(select instanceof HTMLSelectElement)) {
          return;
        }

        var hasRealOption = Array.from(select.options).some(function (option) {
          return option.value && !option.disabled;
        });
        var existingPlaceholder = select.querySelector('option[data-empty-key-placeholder="true"]');

        if (hasRealOption) {
          if (existingPlaceholder) {
            existingPlaceholder.remove();
          }
          return;
        }

        if (!existingPlaceholder) {
          existingPlaceholder = document.createElement("option");
          existingPlaceholder.value = "";
          existingPlaceholder.disabled = true;
          existingPlaceholder.selected = true;
          existingPlaceholder.textContent = emptyLabel;
          existingPlaceholder.setAttribute("data-empty-key-placeholder", "true");
          select.appendChild(existingPlaceholder);
        } else {
          existingPlaceholder.textContent = emptyLabel;
          existingPlaceholder.selected = true;
        }
      }

      function setHistoryDrawerOpen(open) {
        var root = document.documentElement;
        if (!root) {
          return;
        }
        root.classList.toggle('image-history-drawer-open', !!open && isHistoryCollapsed());
      }

      function isHistoryDrawerOpen() {
        return document.documentElement.classList.contains('image-history-drawer-open');
      }

      function isHistoryCollapsed() {
        return manualHistoryCollapsed || autoHistoryCollapsed;
      }

      function syncHistoryDrawerState() {
        var root = document.documentElement;
        if (!root) {
          return;
        }

        var collapsed = isHistoryCollapsed();
        root.classList.toggle('image-history-collapsed', collapsed);
        root.classList.toggle('image-history-auto-collapsed', autoHistoryCollapsed);
        root.classList.toggle('image-history-manual-collapsed', manualHistoryCollapsed);
        if (!collapsed) {
          root.classList.remove('image-history-drawer-open');
        }

        var inlineButton = document.querySelector('[data-testid="history-inline-collapse"]');
        if (inlineButton instanceof HTMLButtonElement) {
          inlineButton.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        }

        var floatingButton = document.querySelector('[data-testid="history-drawer-toggle"]');
        if (floatingButton instanceof HTMLButtonElement) {
          floatingButton.setAttribute('aria-expanded', isHistoryDrawerOpen() ? 'true' : 'false');
        }
      }

      function toggleHistoryDrawer() {
        setHistoryDrawerOpen(!isHistoryDrawerOpen());
        syncHistoryDrawerState();
      }

      function closeHistoryDrawer() {
        setHistoryDrawerOpen(false);
        syncHistoryDrawerState();
      }

      function collapseHistoryManually() {
        manualHistoryCollapsed = true;
        closeHistoryDrawer();
      }

      function expandHistoryFromDrawer() {
        if (!autoHistoryCollapsed) {
          manualHistoryCollapsed = false;
        }
        setHistoryDrawerOpen(true);
        syncHistoryDrawerState();
      }

      function updateAutoHistoryCollapsed() {
        var workspace = document.querySelector('[data-testid="image-workspace"]');
        if (!(workspace instanceof HTMLElement)) {
          return;
        }

        var width = workspace.getBoundingClientRect().width;
        autoHistoryCollapsed = width < 1024;
        syncHistoryDrawerState();
      }

      function ensureHistoryDrawerChrome() {
        var history = document.querySelector('[data-testid="image-history"]');
        if (!(history instanceof HTMLElement)) {
          return;
        }

        var parent = history.parentElement;
        if (!(parent instanceof HTMLElement)) {
          return;
        }

        var topbar = history.querySelector('[data-testid="history-drawer-topbar"]');
        if (!(topbar instanceof HTMLElement)) {
          topbar = document.createElement('div');
          topbar.setAttribute('data-testid', 'history-drawer-topbar');
          topbar.className = 'image-history-drawer-topbar';

          var inlineButton = document.createElement('button');
          inlineButton.type = 'button';
          inlineButton.setAttribute('data-testid', 'history-inline-collapse');
          inlineButton.setAttribute('aria-label', 'Collapse history sidebar');
          inlineButton.setAttribute('aria-expanded', 'true');
          inlineButton.className = 'image-history-inline-collapse';
          inlineButton.innerHTML = '<span aria-hidden="true"></span>';
          inlineButton.addEventListener('click', function () {
            collapseHistoryManually();
          });

          var title = document.createElement('span');
          title.className = 'image-history-drawer-title';
          title.textContent = '历史记录';

          topbar.appendChild(title);
          topbar.appendChild(inlineButton);
          history.insertBefore(topbar, history.firstChild);
        }

        var handle = parent.querySelector('[data-testid="history-drawer-toggle"]');
        if (!(handle instanceof HTMLButtonElement)) {
          handle = document.createElement('button');
          handle.type = 'button';
          handle.setAttribute('data-testid', 'history-drawer-toggle');
          handle.setAttribute('aria-label', 'Toggle history drawer');
          handle.setAttribute('aria-expanded', 'false');
          handle.className = 'image-history-drawer-handle';
          handle.innerHTML = '<span class="image-history-drawer-handle-text">历史</span>';
          handle.addEventListener('click', function () {
            if (manualHistoryCollapsed && !autoHistoryCollapsed) {
              expandHistoryFromDrawer();
              return;
            }
            toggleHistoryDrawer();
          });
          parent.appendChild(handle);
        }

        var overlay = parent.querySelector('[data-testid="history-drawer-overlay"]');
        if (!(overlay instanceof HTMLButtonElement)) {
          overlay = document.createElement('button');
          overlay.type = 'button';
          overlay.setAttribute('data-testid', 'history-drawer-overlay');
          overlay.setAttribute('aria-label', 'Close history drawer');
          overlay.className = 'image-history-drawer-overlay';
          overlay.addEventListener('click', function () {
            closeHistoryDrawer();
          });
          parent.appendChild(overlay);
        }

        history.classList.add('image-history-drawer');
        history.setAttribute('aria-hidden', 'false');
        updateAutoHistoryCollapsed();
      }

      function observeHistoryLayout() {
        var workspace = document.querySelector('[data-testid="image-workspace"]');
        if (!(workspace instanceof HTMLElement)) {
          return;
        }

        if (!historyLayoutObserver && 'ResizeObserver' in window) {
          historyLayoutObserver = new ResizeObserver(updateAutoHistoryCollapsed);
          historyLayoutObserver.observe(workspace);
        }

        updateAutoHistoryCollapsed();
      }

      function getChatScrollArea() {
        var thread = document.querySelector('[data-testid="image-chat-thread"]');
        if (!(thread instanceof HTMLElement)) {
          return null;
        }

        var area = thread.firstElementChild;
        return area instanceof HTMLElement ? area : null;
      }

      function scrollChatToBottom() {
        var area = getChatScrollArea();
        if (!area) {
          return;
        }

        area.scrollTop = area.scrollHeight;
      }

      function observeChatScroll() {
        var attempts = 0;
        var timer = window.setInterval(function () {
          var thread = document.querySelector('[data-testid="image-chat-thread"]');
          attempts += 1;
          if (!(thread instanceof HTMLElement)) {
            if (attempts >= 20) {
              window.clearInterval(timer);
            }
            return;
          }

          window.clearInterval(timer);
          scrollChatToBottom();

          var observer = new MutationObserver(function () {
            window.requestAnimationFrame(scrollChatToBottom);
          });
          observer.observe(thread, { childList: true, subtree: true });
        }, 100);
      }

      document.addEventListener("DOMContentLoaded", function () {
        ensureEmptyKeyOption();
        ensureHistoryDrawerChrome();
        observeHistoryLayout();
        observeChatScroll();

        var attempts = 0;
        var timer = window.setInterval(function () {
          ensureEmptyKeyOption();
          ensureHistoryDrawerChrome();
          observeHistoryLayout();
          attempts += 1;
          if (attempts >= 20) {
            window.clearInterval(timer);
          }
        }, 300);

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeHistoryDrawer();
          }
        });

        window.addEventListener('resize', updateAutoHistoryCollapsed);
      });
    })();
  </script>
  <style>
    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #f8f6f1;
    }

    #app > div {
      height: 100dvh;
      min-height: 0 !important;
      overflow: hidden;
    }

    #app > div > main {
      height: 100%;
      min-height: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    #app > div > main > div {
      height: 100%;
      min-height: 0 !important;
      overflow: hidden;
    }

    #app [data-testid="image-workspace"] {
      display: flex;
      position: relative;
      height: 100%;
      min-height: 0 !important;
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      box-shadow: none;
      overflow: hidden;
    }

    #app [data-testid="image-history"] {
      position: relative;
      z-index: 20;
      height: 100%;
      max-height: none;
      overflow: hidden;
      transform: translateX(0);
      pointer-events: auto;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }

    #app [data-testid="history-drawer-topbar"] {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    #app .image-history-drawer-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.875rem;
      font-weight: 700;
      color: #0f172a;
    }

    #app [data-testid="history-inline-collapse"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 2rem;
      height: 2rem;
      border: 1px solid #e2e8f0;
      border-radius: 9999px;
      background: #ffffff;
      color: #0f172a;
      cursor: pointer;
    }

    #app [data-testid="history-inline-collapse"] span {
      display: block;
      width: 0.75rem;
      height: 0.75rem;
      border: 2px solid currentColor;
      border-right: 0;
      border-bottom: 0;
      transform: rotate(-45deg);
    }

    #app [data-testid="history-drawer-toggle"] {
      position: fixed;
      left: 0;
      top: max(1rem, env(safe-area-inset-top));
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      padding: 0;
      border-radius: 0 9999px 9999px 0;
      border: 1px solid #e2e8f0;
      border-left: 0;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }

    #app [data-testid="history-drawer-toggle"] .image-history-drawer-handle-text {
      display: none;
    }

    #app [data-testid="history-drawer-toggle"]::before {
      content: '';
      width: 1rem;
      height: 1rem;
      border-radius: 9999px;
      border: 2px solid #0f172a;
      border-left: 0;
      border-top: 0;
      transform: rotate(135deg);
    }

    #app [data-testid="history-drawer-overlay"] {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      border: 0;
      background: rgba(15, 23, 42, 0.4);
      cursor: pointer;
    }

    html.image-history-collapsed #app [data-testid="image-history"] {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(88vw, 320px);
      max-width: none;
      border-right: 1px solid #e2e8f0;
      border-bottom: 0;
      box-shadow: 16px 0 32px rgba(15, 23, 42, 0.16);
      transform: translateX(-100%);
      pointer-events: none;
    }

    html.image-history-collapsed #app [data-testid="history-drawer-toggle"] {
      display: inline-flex;
    }

    html.image-history-collapsed.image-history-drawer-open #app [data-testid="history-drawer-toggle"] {
      display: none;
    }

    html.image-history-collapsed.image-history-drawer-open #app [data-testid="image-history"] {
      transform: translateX(0);
      pointer-events: auto;
    }

    html.image-history-collapsed.image-history-drawer-open #app [data-testid="history-drawer-overlay"] {
      display: block;
    }

    #app [data-testid="history-list"] {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    #app [data-testid="image-chat-panel"] {
      height: 100%;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0 !important;
      overflow: hidden;
    }

    #app [data-testid="image-chat-thread"] {
      display: flex;
      flex-direction: column;
      height: 100%;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    #app [data-testid="image-chat-thread"] > div:first-child {
      flex: 1 1 auto;
      max-height: none;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    #app [data-testid="image-chat-thread"] > div:last-child {
      margin-top: 0;
      flex: 0 0 auto;
    }

    #app [data-testid="image-chat-composer"] {
      flex-shrink: 0;
    }

    #app [data-testid="image-chat-composer"] textarea {
      max-height: 32dvh;
      overflow-y: auto;
    }

    #app [data-testid="image-chat-composer"] textarea + div {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 0.375rem;
    }

    #app [data-testid="image-chat-composer"] textarea + div > button[type="button"],
    #app [data-testid="image-chat-composer"] textarea + div > select {
      width: auto !important;
      min-width: 0 !important;
      max-width: 100%;
      height: 36px !important;
      min-height: 36px !important;
      flex: 0 0 auto;
      font-size: 13px !important;
      line-height: 1.25 !important;
      padding-left: 0.75rem !important;
      padding-right: 0.75rem !important;
      white-space: nowrap;
    }

    #app [data-testid="image-chat-composer"] textarea + div > select {
      padding-right: 1.75rem !important;
      height: 40px !important;
      min-height: 40px !important;
      line-height: normal !important;
    }

    @media (max-width: 1023px) {
      #app [data-testid="image-workspace"] {
        flex-direction: column;
      }

      #app [data-testid="image-chat-panel"] {
        flex: 1 1 auto;
      }

      #app [data-testid="image-chat-thread"] {
        min-height: 0;
        height: 100%;
      }
    }

    @media (max-width: 767px) {
      #app [data-testid="image-history"] {
        padding: 0.75rem;
      }

      html.image-history-collapsed #app [data-testid="image-history"] {
        width: min(92vw, 340px);
      }

      #app [data-testid="image-chat-thread"] > div:first-child {
        padding-left: 1rem;
        padding-right: 1rem;
        padding-top: 1rem;
      }

      #app [data-testid="image-chat-composer"] {
        border-radius: 20px;
      }
    }

    @media (max-width: 767px), (max-height: 720px) {
      #app [data-testid="image-chat-thread"] > div:first-child {
        padding: 0.875rem !important;
      }

      #app [data-testid="image-chat-thread"] > div:first-child:not(:has(article)) {
        justify-content: flex-start;
        padding-top: 1.5rem !important;
      }

      #app [data-testid="image-chat-composer"] {
        padding: 0.75rem !important;
        border-radius: 16px !important;
      }

      #app [data-testid="image-chat-composer"] > div:first-child {
        gap: 0.625rem;
      }

      #app [data-testid="image-chat-composer"] > div:first-child > div:last-child {
        gap: 0.625rem;
      }

      #app [data-testid="image-chat-composer"] textarea {
        min-height: 56px !important;
        max-height: 20dvh;
      }

      #app label:has(> [data-testid="reference-image-input"]) {
        width: 56px !important;
        height: 56px !important;
        min-width: 56px;
        border-radius: 14px !important;
      }

      #app [data-testid="reference-image-input"] + img,
      #app [data-testid="reference-image-preview"] {
        border-radius: 14px;
      }

      #app [data-testid="reference-image-input"]::file-selector-button {
        font-size: 0.75rem;
      }

      #app [data-testid="image-chat-composer"] textarea + div {
        gap: 0.375rem;
      }

      #app [data-testid="image-model-select"] {
        width: auto !important;
        min-width: 0 !important;
        max-width: 100%;
      }

      #app [data-testid="image-chat-composer"] [class*="tabular-nums"] {
        height: 36px !important;
        min-height: 36px !important;
        flex: 0 0 auto;
        font-size: 13px !important;
      }

      #app [data-testid="image-chat-composer"] [class*="ml-auto"] {
        margin-left: auto !important;
        align-self: flex-end;
        flex: 0 0 auto;
        gap: 0.375rem;
      }

      #app [data-testid="image-send-button"] {
        width: 40px !important;
        height: 40px !important;
        font-size: 1rem !important;
      }

      #app [data-testid="image-chat-composer"] [class*="max-w-[132px]"] {
        display: none;
      }
    }

    @media (max-width: 640px) {
      #app [data-testid="image-chat-composer"] > div:first-child {
        align-items: flex-start;
      }

      #app [data-testid="image-chat-composer"] > div:first-child > div:last-child {
        width: auto;
        min-width: 0;
        flex: 1 1 0;
      }

      #app label:has(> [data-testid="reference-image-input"]) {
        width: 48px !important;
        height: 48px !important;
        min-width: 48px;
      }

      #app [data-testid="image-chat-composer"] textarea + div > button[type="button"],
      #app [data-testid="image-chat-composer"] textarea + div > select,
      #app [data-testid="image-model-select"] {
        width: auto !important;
        min-width: 0 !important;
        max-width: 100%;
      }

      #app [data-testid="image-chat-composer"] [class*="ml-auto"] {
        margin-left: auto !important;
        align-self: flex-end;
      }
    }

    @media (min-width: 1024px) {
      #app [data-testid="image-history"] {
        width: 300px;
        box-shadow: none;
      }

      html.image-history-collapsed #app [data-testid="image-history"] {
        width: 300px;
        box-shadow: 16px 0 32px rgba(15, 23, 42, 0.16);
      }

      #app [data-testid="history-drawer-toggle"] {
        width: auto;
        gap: 0.375rem;
        padding: 0.625rem 0.75rem;
        border-radius: 0 9999px 9999px 0;
      }

      #app [data-testid="history-drawer-toggle"] .image-history-drawer-handle-text {
        display: inline;
      }

      #app [data-testid="history-drawer-toggle"]::before {
        content: '';
        width: 1rem;
        height: 1rem;
        border: 0;
        border-left: 0;
        border-top: 0;
        border-radius: 0;
        transform: rotate(135deg);
      }
    }
  </style>
</head>
<body>
  <div id="app" data-plugin-api-base="/plugins/image-generation/api"></div>
</body>
</html>
