<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Generation Plugin</title>
  <script type="module" crossorigin src="/plugins/image-generation/assets/app.js"></script>
  <link rel="stylesheet" crossorigin href="/plugins/image-generation/assets/app.css">
  <script>
    (function () {
      var emptyLabel = "\u6682\u65e0\u53ef\u7528 key";
      var manualHistoryCollapsed = false;
      var autoHistoryCollapsed = false;
      var historyLayoutObserver = null;
      var remoteHistoryIds = [];
      var remoteHistoryKeys = [];
      var deletedLocalHistoryKeys = [];
      var deleteConfirmDialogState = null;

      function rememberHistoryItems(payload) {
        if (!payload || !Array.isArray(payload.items)) {
          return;
        }
        remoteHistoryIds = payload.items.map(function (item) {
          return item && item.id ? String(item.id) : "";
        }).filter(Boolean);
        var groups = new Map();
        payload.items.forEach(function (item) {
          if (!item || !item.id) {
            return;
          }
          var request = item.request && typeof item.request === "object" ? item.request : {};
          var conversationId = String(item.conversation_id || request.conversation_id || item.id);
          var records = groups.get(conversationId) || [];
          records.push(String(item.id));
          groups.set(conversationId, records);
        });
        remoteHistoryKeys = Array.from(groups.values()).map(function (ids) {
          return "history-remote-" + ids.join(",");
        });
      }

      function installHistoryDeleteFetchObserver() {
        if (window.__imageGenerationHistoryDeleteFetchObserverInstalled) {
          return;
        }
        window.__imageGenerationHistoryDeleteFetchObserverInstalled = true;
        var originalFetch = window.fetch;
        window.fetch = function () {
          var input = arguments[0];
          var requestUrl = typeof input === "string" ? input : (input && input.url) || "";
          return originalFetch.apply(this, arguments).then(function (response) {
            if (/\/plugins\/image-generation\/api\/history(?:\?|$)/.test(requestUrl) && response.ok) {
              response.clone().json().then(rememberHistoryItems).catch(function () {});
            }
            return response;
          });
        };
      }

      function deleteHistoryRecord(id) {
        return window.fetch("/plugins/image-generation/api/history/" + encodeURIComponent(id), {
          method: "DELETE",
        }).then(function (response) {
          if (!response.ok) {
            throw new Error("delete history failed");
          }
        });
      }

      function ensureDeleteConfirmDialog() {
        if (deleteConfirmDialogState) {
          return deleteConfirmDialogState;
        }

        var overlay = document.createElement("div");
        overlay.className = "modal-overlay image-delete-confirm-overlay";
        overlay.setAttribute("data-testid", "history-delete-confirm-overlay");
        overlay.setAttribute("hidden", "hidden");
        overlay.setAttribute("aria-hidden", "true");

        var dialog = document.createElement("div");
        dialog.className = "modal-content image-delete-confirm-dialog";
        dialog.setAttribute("role", "dialog");
        dialog.setAttribute("aria-modal", "true");
        dialog.setAttribute("aria-labelledby", "history-delete-confirm-title");
        dialog.setAttribute("aria-describedby", "history-delete-confirm-message");

        var header = document.createElement("div");
        header.className = "modal-header";

        var title = document.createElement("h3");
        title.className = "modal-title";
        title.id = "history-delete-confirm-title";
        title.textContent = "确认删除";

        var closeButton = document.createElement("button");
        closeButton.type = "button";
        closeButton.className = "image-delete-confirm-close";
        closeButton.setAttribute("aria-label", "关闭删除确认弹窗");
        closeButton.innerHTML = "&times;";

        header.appendChild(title);
        header.appendChild(closeButton);

        var body = document.createElement("div");
        body.className = "modal-body";

        var message = document.createElement("p");
        message.id = "history-delete-confirm-message";
        message.className = "image-delete-confirm-message";
        message.textContent = "确认删除当前历史记录吗？";
        body.appendChild(message);

        var footer = document.createElement("div");
        footer.className = "modal-footer";

        var cancelButton = document.createElement("button");
        cancelButton.type = "button";
        cancelButton.className = "image-delete-confirm-cancel";
        cancelButton.textContent = "取消";

        var confirmButton = document.createElement("button");
        confirmButton.type = "button";
        confirmButton.className = "image-delete-confirm-accept";
        confirmButton.textContent = "删除";

        footer.appendChild(cancelButton);
        footer.appendChild(confirmButton);

        dialog.appendChild(header);
        dialog.appendChild(body);
        dialog.appendChild(footer);
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        deleteConfirmDialogState = {
          overlay: overlay,
          confirmButton: confirmButton,
          cancelButton: cancelButton,
          closeButton: closeButton,
          resolver: null,
          previousActiveElement: null,
        };

        function closeDeleteConfirm(result) {
          if (!deleteConfirmDialogState || !deleteConfirmDialogState.resolver) {
            return;
          }
          var resolver = deleteConfirmDialogState.resolver;
          deleteConfirmDialogState.resolver = null;
          overlay.setAttribute("hidden", "hidden");
          overlay.setAttribute("aria-hidden", "true");
          document.body.classList.remove("modal-open");
          if (deleteConfirmDialogState.previousActiveElement && typeof deleteConfirmDialogState.previousActiveElement.focus === "function") {
            deleteConfirmDialogState.previousActiveElement.focus();
          }
          deleteConfirmDialogState.previousActiveElement = null;
          resolver(result);
        }

        overlay.addEventListener("click", function (event) {
          if (event.target === overlay) {
            closeDeleteConfirm(false);
          }
        });

        cancelButton.addEventListener("click", function () {
          closeDeleteConfirm(false);
        });

        closeButton.addEventListener("click", function () {
          closeDeleteConfirm(false);
        });

        confirmButton.addEventListener("click", function () {
          closeDeleteConfirm(true);
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && deleteConfirmDialogState && deleteConfirmDialogState.resolver) {
            event.preventDefault();
            closeDeleteConfirm(false);
          }
        });

        return deleteConfirmDialogState;
      }

      function openDeleteConfirmDialog() {
        var state = ensureDeleteConfirmDialog();
        if (state.resolver) {
          return Promise.resolve(false);
        }
        state.previousActiveElement = document.activeElement instanceof HTMLElement ? document.activeElement : null;
        state.overlay.removeAttribute("hidden");
        state.overlay.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-open");
        return new Promise(function (resolve) {
          state.resolver = resolve;
          window.requestAnimationFrame(function () {
            state.confirmButton.focus();
          });
        });
      }

      function deleteLoadedRemoteHistory(ids) {
        var targetIds = (ids && ids.length ? ids : remoteHistoryIds).slice();
        if (!targetIds.length) {
          return;
        }
        if (!window.confirm("确认删除当前历史记录吗？")) {
          return;
        }
        Promise.all(targetIds.map(deleteHistoryRecord)).then(function () {
          window.location.reload();
        }).catch(function () {
          window.alert("删除历史记录失败，请稍后重试");
        });
      }

      deleteLoadedRemoteHistory = function (ids) {
        var targetIds = (ids && ids.length ? ids : remoteHistoryIds).slice();
        if (!targetIds.length) {
          return;
        }
        openDeleteConfirmDialog().then(function (confirmed) {
          if (!confirmed) {
            return;
          }
          return Promise.all(targetIds.map(deleteHistoryRecord)).then(function () {
            window.location.reload();
          }).catch(function () {
            window.alert("删除历史记录失败，请稍后重试");
          });
        });
      };

      function getHistoryItemKey(item) {
        if (!(item instanceof HTMLElement)) {
          return "";
        }
        if (item.dataset.historyKey) {
          return item.dataset.historyKey;
        }
        var key = "";
        if (item.__vnode && item.__vnode.key) {
          key = String(item.__vnode.key);
        } else if (item.__vueParentComponent && item.__vueParentComponent.vnode && item.__vueParentComponent.vnode.key) {
          key = String(item.__vueParentComponent.vnode.key);
        }
        if (key) {
          item.dataset.historyKey = key;
        }
        return key;
      }

      function isRemoteHistoryItemKey(key) {
        return typeof key === "string" && key.indexOf("history-remote-") === 0;
      }

      function getRemoteHistoryIdsFromKey(key) {
        if (!isRemoteHistoryItemKey(key)) {
          return [];
        }
        return key.slice("history-remote-".length).split(",").map(function (id) {
          return id.trim();
        }).filter(Boolean);
      }

      function isDeletedLocalHistoryKey(key) {
        return deletedLocalHistoryKeys.indexOf(key) >= 0;
      }

      function markLocalHistoryDeleted(key) {
        if (!key || isDeletedLocalHistoryKey(key)) {
          return;
        }
        deletedLocalHistoryKeys.push(key);
      }

      function removeRemoteHistoryCache(ids, key) {
        var removedIds = (ids || []).map(function (id) {
          return String(id);
        });
        if (removedIds.length) {
          remoteHistoryIds = remoteHistoryIds.filter(function (id) {
            return removedIds.indexOf(String(id)) === -1;
          });
        }
        if (key) {
          remoteHistoryKeys = remoteHistoryKeys.filter(function (historyKey) {
            return historyKey !== key;
          });
        }
      }

      function findHistoryItemsByKey(key) {
        if (!key) {
          return [];
        }
        return Array.from(document.querySelectorAll('[data-testid="history-item"]')).filter(function (item) {
          return item instanceof HTMLElement && getHistoryItemKey(item) === key;
        });
      }

      function selectFallbackHistoryItem(excludedKey) {
        var historyItems = Array.from(document.querySelectorAll('[data-testid="history-item"]'));
        for (var index = 0; index < historyItems.length; index += 1) {
          var item = historyItems[index];
          if (!(item instanceof HTMLButtonElement)) {
            continue;
          }
          var key = getHistoryItemKey(item);
          if (!key || key === excludedKey || isDeletedLocalHistoryKey(key)) {
            continue;
          }
          item.click();
          return true;
        }
        var createButton = document.querySelector('[data-testid="new-image-session"]');
        if (createButton instanceof HTMLButtonElement) {
          createButton.click();
          return true;
        }
        return false;
      }

      function deleteLocalHistoryItem(item, key) {
        if (!(item instanceof HTMLElement) || !key) {
          return;
        }
        var isActive = item.className.indexOf("bg-slate-950") >= 0;
        markLocalHistoryDeleted(key);
        if (isActive) {
          selectFallbackHistoryItem(key);
        }
        item.style.display = "none";
      }

      function deleteRemoteHistoryItems(ids) {
        var targetIds = (ids && ids.length ? ids : remoteHistoryIds).slice();
        if (!targetIds.length) {
          return;
        }

        var historyKey = "history-remote-" + targetIds.join(",");
        var matchingItems = findHistoryItemsByKey(historyKey);

        removeRemoteHistoryCache(targetIds, historyKey);
        markLocalHistoryDeleted(historyKey);

        if (matchingItems.length) {
          matchingItems.forEach(function (item, index) {
            var shouldSwitch = index === 0;
            if (shouldSwitch && item.className.indexOf("bg-slate-950") >= 0) {
              selectFallbackHistoryItem(historyKey);
            }
            item.style.display = "none";
          });
          return;
        }

        selectFallbackHistoryItem(historyKey);
      }

      deleteLoadedRemoteHistory = function (ids) {
        var targetIds = (ids && ids.length ? ids : remoteHistoryIds).slice();
        if (!targetIds.length) {
          return;
        }
        openDeleteConfirmDialog().then(function (confirmed) {
          if (!confirmed) {
            return;
          }
          return Promise.all(targetIds.map(deleteHistoryRecord)).then(function () {
            deleteRemoteHistoryItems(targetIds);
          }).catch(function () {
            window.alert("删除历史记录失败，请稍后重试");
          });
        });
      };

      function ensureEmptyKeyOption() {
        var select = document.querySelector('[data-testid="image-key-select"]');
        if (!(select instanceof HTMLSelectElement)) {
          return;
        }

        var hasRealOption = Array.from(select.options).some(function (option) {
          return option.value && !option.disabled;
        });
        var existingPlaceholder = select.querySelector('option[data-empty-key-placeholder="true"]');

        if (hasRealOption) {
          if (existingPlaceholder) {
            existingPlaceholder.remove();
          }
          return;
        }

        if (!existingPlaceholder) {
          existingPlaceholder = document.createElement("option");
          existingPlaceholder.value = "";
          existingPlaceholder.disabled = true;
          existingPlaceholder.selected = true;
          existingPlaceholder.textContent = emptyLabel;
          existingPlaceholder.setAttribute("data-empty-key-placeholder", "true");
          select.appendChild(existingPlaceholder);
        } else {
          existingPlaceholder.textContent = emptyLabel;
          existingPlaceholder.selected = true;
        }
      }

      function setHistoryDrawerOpen(open) {
        var root = document.documentElement;
        if (!root) {
          return;
        }
        root.classList.toggle('image-history-drawer-open', !!open && isHistoryCollapsed());
      }

      function isHistoryDrawerOpen() {
        return document.documentElement.classList.contains('image-history-drawer-open');
      }

      function isHistoryCollapsed() {
        return manualHistoryCollapsed || autoHistoryCollapsed;
      }

      function syncHistoryDrawerState() {
        var root = document.documentElement;
        if (!root) {
          return;
        }

        var collapsed = isHistoryCollapsed();
        root.classList.toggle('image-history-collapsed', collapsed);
        root.classList.toggle('image-history-auto-collapsed', autoHistoryCollapsed);
        root.classList.toggle('image-history-manual-collapsed', manualHistoryCollapsed);
        if (!collapsed) {
          root.classList.remove('image-history-drawer-open');
        }

        var inlineButton = document.querySelector('[data-testid="history-inline-collapse"]');
        if (inlineButton instanceof HTMLButtonElement) {
          inlineButton.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        }

        var floatingButton = document.querySelector('[data-testid="history-drawer-toggle"]');
        if (floatingButton instanceof HTMLButtonElement) {
          floatingButton.setAttribute('aria-expanded', isHistoryDrawerOpen() ? 'true' : 'false');
        }
      }

      function toggleHistoryDrawer() {
        setHistoryDrawerOpen(!isHistoryDrawerOpen());
        syncHistoryDrawerState();
      }

      function closeHistoryDrawer() {
        setHistoryDrawerOpen(false);
        syncHistoryDrawerState();
      }

      function collapseHistoryManually() {
        manualHistoryCollapsed = true;
        closeHistoryDrawer();
      }

      function expandHistoryFromDrawer() {
        if (!autoHistoryCollapsed) {
          manualHistoryCollapsed = false;
        }
        setHistoryDrawerOpen(true);
        syncHistoryDrawerState();
      }

      function updateAutoHistoryCollapsed() {
        var workspace = document.querySelector('[data-testid="image-workspace"]');
        if (!(workspace instanceof HTMLElement)) {
          return;
        }

        var width = workspace.getBoundingClientRect().width;
        autoHistoryCollapsed = width < 1024;
        syncHistoryDrawerState();
      }

      function ensureHistoryDrawerChrome() {
        var history = document.querySelector('[data-testid="image-history"]');
        if (!(history instanceof HTMLElement)) {
          return;
        }

        var parent = history.parentElement;
        if (!(parent instanceof HTMLElement)) {
          return;
        }

        var topbar = history.querySelector('[data-testid="history-drawer-topbar"]');
        if (!(topbar instanceof HTMLElement)) {
          topbar = document.createElement('div');
          topbar.setAttribute('data-testid', 'history-drawer-topbar');
          topbar.className = 'image-history-drawer-topbar';

          var inlineButton = document.createElement('button');
          inlineButton.type = 'button';
          inlineButton.setAttribute('data-testid', 'history-inline-collapse');
          inlineButton.setAttribute('aria-label', 'Collapse history sidebar');
          inlineButton.setAttribute('aria-expanded', 'true');
          inlineButton.className = 'image-history-inline-collapse';
          inlineButton.innerHTML = '<span aria-hidden="true"></span>';
          inlineButton.addEventListener('click', function () {
            collapseHistoryManually();
          });

          var title = document.createElement('span');
          title.className = 'image-history-drawer-title';
          title.textContent = '历史记录';

          topbar.appendChild(title);
          topbar.appendChild(inlineButton);
          history.insertBefore(topbar, history.firstChild);
        }

        var handle = parent.querySelector('[data-testid="history-drawer-toggle"]');
        if (!(handle instanceof HTMLButtonElement)) {
          handle = document.createElement('button');
          handle.type = 'button';
          handle.setAttribute('data-testid', 'history-drawer-toggle');
          handle.setAttribute('aria-label', 'Toggle history drawer');
          handle.setAttribute('aria-expanded', 'false');
          handle.className = 'image-history-drawer-handle';
          handle.innerHTML = '<span class="image-history-drawer-handle-text">历史</span>';
          handle.addEventListener('click', function () {
            if (manualHistoryCollapsed && !autoHistoryCollapsed) {
              expandHistoryFromDrawer();
              return;
            }
            toggleHistoryDrawer();
          });
          parent.appendChild(handle);
        }

        var overlay = parent.querySelector('[data-testid="history-drawer-overlay"]');
        if (!(overlay instanceof HTMLButtonElement)) {
          overlay = document.createElement('button');
          overlay.type = 'button';
          overlay.setAttribute('data-testid', 'history-drawer-overlay');
          overlay.setAttribute('aria-label', 'Close history drawer');
          overlay.className = 'image-history-drawer-overlay';
          overlay.addEventListener('click', function () {
            closeHistoryDrawer();
          });
          parent.appendChild(overlay);
        }

        history.classList.add('image-history-drawer');
        history.setAttribute('aria-hidden', 'false');
        ensureHistoryDeleteButtons();
        updateAutoHistoryCollapsed();
      }

      function ensureHistoryDeleteButtons() {
        var historyItems = Array.from(document.querySelectorAll('[data-testid="history-item"]'));
        historyItems.forEach(function (item, index) {
          if (!(item instanceof HTMLButtonElement)) {
            return;
          }
          var historyKey = getHistoryItemKey(item);
          if (!historyKey && remoteHistoryKeys[index]) {
            historyKey = remoteHistoryKeys[index];
            item.dataset.historyKey = historyKey;
          }
          if (historyKey && isDeletedLocalHistoryKey(historyKey)) {
            item.style.display = "none";
            return;
          }
          item.style.display = "";
          var existingButton = item.querySelector('[data-testid="history-delete-button"]');
          if (item.querySelector('[data-testid="history-delete-button"]')) {
            return;
          }
          if (!item.textContent) {
            return;
          }

          var deleteButton = document.createElement("span");
          deleteButton.setAttribute("role", "button");
          deleteButton.setAttribute("tabindex", "0");
          deleteButton.setAttribute("aria-label", "Delete history");
          deleteButton.setAttribute("data-testid", "history-delete-button");
          deleteButton.className = "image-history-delete-button";
          deleteButton.textContent = "删除";
          deleteButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            var key = getHistoryItemKey(item);
            if (isRemoteHistoryItemKey(key)) {
              var remoteHistoryIds = getRemoteHistoryIdsFromKey(key);
              deleteLoadedRemoteHistory(remoteHistoryIds.length ? remoteHistoryIds : void 0);
              return;
            }
            deleteLocalHistoryItem(item, key);
          });
          deleteButton.addEventListener("keydown", function (event) {
            if (event.key !== "Enter" && event.key !== " ") {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            var key = getHistoryItemKey(item);
            if (isRemoteHistoryItemKey(key)) {
              var remoteHistoryIds = getRemoteHistoryIdsFromKey(key);
              deleteLoadedRemoteHistory(remoteHistoryIds.length ? remoteHistoryIds : void 0);
              return;
            }
            deleteLocalHistoryItem(item, key);
          });
          item.appendChild(deleteButton);
        });
      }

      function observeHistoryLayout() {
        var workspace = document.querySelector('[data-testid="image-workspace"]');
        if (!(workspace instanceof HTMLElement)) {
          return;
        }

        if (!historyLayoutObserver && 'ResizeObserver' in window) {
          historyLayoutObserver = new ResizeObserver(updateAutoHistoryCollapsed);
          historyLayoutObserver.observe(workspace);
        }

        updateAutoHistoryCollapsed();
      }

      function getChatScrollArea() {
        var thread = document.querySelector('[data-testid="image-chat-thread"]');
        if (!(thread instanceof HTMLElement)) {
          return null;
        }

        var area = thread.firstElementChild;
        return area instanceof HTMLElement ? area : null;
      }

      function scrollChatToBottom() {
        var area = getChatScrollArea();
        if (!area) {
          return;
        }

        area.scrollTop = area.scrollHeight;
      }

      function observeChatScroll() {
        var attempts = 0;
        var timer = window.setInterval(function () {
          var thread = document.querySelector('[data-testid="image-chat-thread"]');
          attempts += 1;
          if (!(thread instanceof HTMLElement)) {
            if (attempts >= 20) {
              window.clearInterval(timer);
            }
            return;
          }

          window.clearInterval(timer);
          scrollChatToBottom();

          var observer = new MutationObserver(function () {
            window.requestAnimationFrame(scrollChatToBottom);
          });
          observer.observe(thread, { childList: true, subtree: true });
        }, 100);
      }

      installHistoryDeleteFetchObserver();

      document.addEventListener("DOMContentLoaded", function () {
        ensureEmptyKeyOption();
        ensureHistoryDrawerChrome();
        observeHistoryLayout();
        observeChatScroll();

        var attempts = 0;
        var timer = window.setInterval(function () {
          ensureEmptyKeyOption();
          ensureHistoryDrawerChrome();
          ensureHistoryDeleteButtons();
          observeHistoryLayout();
          attempts += 1;
          if (attempts >= 20) {
            window.clearInterval(timer);
          }
        }, 300);

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeHistoryDrawer();
          }
        });

        window.addEventListener('resize', updateAutoHistoryCollapsed);
      });
    })();
  </script>
  <style>
    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #f8f6f1;
    }

    body.modal-open {
      overflow: hidden;
    }

    #app > div {
      height: 100dvh;
      min-height: 0 !important;
      overflow: hidden;
    }

    #app > div > main {
      height: 100%;
      min-height: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    #app > div > main > div {
      height: 100%;
      min-height: 0 !important;
      overflow: hidden;
    }

    #app [data-testid="image-workspace"] {
      display: flex;
      position: relative;
      height: 100%;
      min-height: 0 !important;
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      box-shadow: none;
      overflow: hidden;
    }

    #app [data-testid="image-history"] {
      position: relative;
      z-index: 20;
      height: 100%;
      max-height: none;
      overflow: hidden;
      transform: translateX(0);
      pointer-events: auto;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }

    #app [data-testid="history-drawer-topbar"] {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    #app .image-history-drawer-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.875rem;
      font-weight: 700;
      color: #0f172a;
    }

    #app [data-testid="history-inline-collapse"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 2rem;
      height: 2rem;
      border: 1px solid #e2e8f0;
      border-radius: 9999px;
      background: #ffffff;
      color: #0f172a;
      cursor: pointer;
    }

    #app [data-testid="history-inline-collapse"] span {
      display: block;
      width: 0.75rem;
      height: 0.75rem;
      border: 2px solid currentColor;
      border-right: 0;
      border-bottom: 0;
      transform: rotate(-45deg);
    }

    #app [data-testid="history-drawer-toggle"] {
      position: fixed;
      left: 0;
      top: max(1rem, env(safe-area-inset-top));
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      padding: 0;
      border-radius: 0 9999px 9999px 0;
      border: 1px solid #e2e8f0;
      border-left: 0;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }

    #app [data-testid="history-drawer-toggle"] .image-history-drawer-handle-text {
      display: none;
    }

    #app [data-testid="history-drawer-toggle"]::before {
      content: '';
      width: 1rem;
      height: 1rem;
      border-radius: 9999px;
